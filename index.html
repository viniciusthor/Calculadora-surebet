<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SureCalc Mobile</title>
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --danger: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 22px;
            color: var(--primary);
            margin: 0;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-size: 18px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .result-card {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .profit-badge {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .is-sure { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .not-sure { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }

        .bet-box {
            background: #252525;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bet-val { font-size: 20px; font-weight: bold; color: var(--primary); }
        
        .copy-btn {
            background: #333;
            border: none;
            color: #aaa;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 10px;
            cursor: pointer;
        }

        .copy-btn:active { background: var(--primary); color: white; }

        .reset-btn {
            width: 100%;
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>SUREBET PRO ⚽</h1>
    </div>

    <div class="card">
        <div class="input-group">
            <label>Investimento Total (R$)</label>
            <input type="number" id="total" inputmode="decimal" placeholder="0,00" oninput="calc()">
        </div>
        <div class="grid">
            <div class="input-group">
                <label>Odd Casa A</label>
                <input type="number" id="oddA" inputmode="decimal" placeholder="1.00" oninput="calc()">
            </div>
            <div class="input-group">
                <label>Odd Casa B</label>
                <input type="number" id="oddB" inputmode="decimal" placeholder="1.00" oninput="calc()">
            </div>
        </div>
        <button class="reset-btn" onclick="reset()">Limpar Tudo</button>
    </div>

    <div id="resultCard" class="card result-card">
        <div id="badge" class="profit-badge"></div>
        
        <label>Apostar na Casa A:</label>
        <div class="bet-box">
            <span class="bet-val" id="resA">R$ 0,00</span>
            <button class="copy-btn" onclick="copy('resA')">COPIAR</button>
        </div>

        <label>Apostar na Casa B:</label>
        <div class="bet-box">
            <span class="bet-val" id="resB">R$ 0,00</span>
            <button class="copy-btn" onclick="copy('resB')">COPIAR</button>
        </div>

        <div style="text-align: center; margin-top: 10px; font-size: 14px;">
            Lucro Real: <span id="lucroReal" style="color: var(--primary); font-weight: bold;">R$ 0,00</span>
        </div>
    </div>
</div>

<script>
    function calc() {
        const total = parseFloat(document.getElementById('total').value);
        const oddA = parseFloat(document.getElementById('oddA').value);
        const oddB = parseFloat(document.getElementById('oddB').value);
        const resCard = document.getElementById('resultCard');

        if (total > 0 && oddA > 1 && oddB > 1) {
            const m1 = 1 / oddA;
            const m2 = 1 / oddB;
            const margem = m1 + m2;
            const isSure = margem < 1;
            const lucroPct = ((1 - margem) * 100).toFixed(2);

            const a1 = (total * m1 / margem).toFixed(2);
            const a2 = (total * m2 / margem).toFixed(2);
            const lucroR = ((a1 * oddA) - total).toFixed(2);

            document.getElementById('resA').innerText = 'R$ ' + a1;
            document.getElementById('resB').innerText = 'R$ ' + a2;
            document.getElementById('lucroReal').innerText = 'R$ ' + lucroR;
            
            const badge = document.getElementById('badge');
            badge.className = 'profit-badge ' + (isSure ? 'is-sure' : 'not-sure');
            badge.innerHTML = isSure ? '✅ LUCRO: ' + lucroPct + '%' : '❌ PREJUÍZO: ' + lucroPct + '%';

            resCard.style.display = 'block';
        } else {
            resCard.style.display = 'none';
        }
    }

    function copy(id) {
        const text = document.getElementById(id).innerText.replace('R$ ', '');
        navigator.clipboard.writeText(text);
    }

    function reset() {
        document.getElementById('total').value = '';
        document.getElementById('oddA').value = '';
        document.getElementById('oddB').value = '';
        document.getElementById('resultCard').style.display = 'none';
    }
</script>

</body>
</html>
